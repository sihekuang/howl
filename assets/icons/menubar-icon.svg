<?xml version="1.0" encoding="UTF-8"?>
<!--
  VoiceKeyboard menu bar icon — template image (single solid colour).
  Stylised husky head silhouette in the same shape vocabulary as the
  app icon: triangular ears + round skull. Detail removed (eyes, nose,
  mouth) since macOS auto-tints the whole asset uniformly; the
  silhouette alone needs to read at 16×16. Punched-out eyes and nose
  use the system background colour so the face still reads as a face.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <g fill="#000000" stroke="none">
    <!-- Ears: triangles matching the app-icon proportions. -->
    <path d="M 8 13 L 6 4 L 13 10 Z"/>
    <path d="M 24 13 L 26 4 L 19 10 Z"/>

    <!-- Head: round, slightly wider than tall. -->
    <circle cx="16" cy="17" r="9"/>
  </g>

  <!-- Negative-space details, painted in the inverse colour so the
       silhouette still reads as a face after tinting. -->
  <g fill="#ffffff" stroke="none">
    <circle cx="13" cy="15.5" r="1.4"/>
    <circle cx="19" cy="15.5" r="1.4"/>
    <ellipse cx="16" cy="20" rx="1.6" ry="1.1"/>
  </g>
</svg>
