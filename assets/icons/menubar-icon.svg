<?xml version="1.0" encoding="UTF-8"?>
<!--
  VoiceKeyboard menu bar icon — template image.
  Single solid color (black). macOS auto-tints based on appearance
  (dark/light mode, active/inactive state) when the asset is marked
  as "Template Image" in Assets.xcassets.

  Designed for clarity at 16×16 (1x) and 32×32 (2x). Corner radii
  and stroke widths intentionally generous so the silhouette stays
  legible after tinting + system anti-aliasing.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <g fill="#000000" stroke="#000000" stroke-linecap="round" stroke-linejoin="round">
    <!-- Capsule body — solid fill at small size, no gradient. -->
    <rect x="11" y="4" width="10" height="16" rx="5" ry="5"/>

    <!-- Yoke. Single rounded path so it renders cleanly at 16px. -->
    <path d="M 7 15 V 18 A 9 9 0 0 0 25 18 V 15"
          fill="none" stroke-width="2"/>

    <!-- Stand. -->
    <line x1="16" y1="22" x2="16" y2="26" stroke-width="2"/>

    <!-- Base. -->
    <rect x="11" y="26" width="10" height="2" rx="1" ry="1"/>
  </g>
</svg>
