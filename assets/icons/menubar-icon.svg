<?xml version="1.0" encoding="UTF-8"?>
<!--
  VoiceKeyboard menu bar icon — template image (single solid colour).
  Stylised husky head, simplified to read at 16×16 once macOS tints it.
  Detail removed: no eye colour (filled solid), no nose highlight,
  no tongue. The face mask is implied by the silhouette of the ears
  and the head shape.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <g fill="#000000" stroke="#000000" stroke-linejoin="round" stroke-linecap="round">
    <!-- Ears. -->
    <path d="M 8 11 L 10 4 L 13.5 10 Z"/>
    <path d="M 24 11 L 22 4 L 18.5 10 Z"/>

    <!-- Head silhouette. -->
    <path d="M 6 15
             C 6 10, 10 8, 16 8
             C 22 8, 26 10, 26 15
             C 26 19, 25 23, 22 26
             C 20 27.6, 18 28, 16 28
             C 14 28, 12 27.6, 10 26
             C 7 23, 6 19, 6 15 Z"/>

    <!-- Eyes — punched-out negative space so the silhouette reads as a
         face. SVG doesn't compose easily without masks; using small
         filled circles in the bg colour is fine for a template image
         since macOS tints the whole asset uniformly anyway, and the
         "white" here will become the system background colour. -->
    <circle cx="13" cy="15" r="1.4" fill="#ffffff" stroke="none"/>
    <circle cx="19" cy="15" r="1.4" fill="#ffffff" stroke="none"/>

    <!-- Nose. -->
    <ellipse cx="16" cy="20" rx="1.6" ry="1.2" fill="#ffffff" stroke="none"/>
  </g>
</svg>
