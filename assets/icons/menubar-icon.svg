<?xml version="1.0" encoding="UTF-8"?>
<!--
  VoiceKeyboard menu bar icon — template image (single solid colour).
  Same howling-husky silhouette as the app icon, but everything
  opaque collapses to the tint colour macOS picks for the menu bar.

  Note: the source PNG renders the husky's "white" face details
  (eye, mouth, fur tufts) as solid-white pixels, not transparent.
  Under template-image rendering macOS treats every opaque pixel
  as the tint colour regardless of its source RGB, so those
  internal whites merge into the silhouette and we end up with a
  filled husky head — which is what we want at 16×16 anyway.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <image href="howling-husky.png"
         x="2" y="1"
         width="28" height="30"
         preserveAspectRatio="xMidYMid meet"/>
</svg>
