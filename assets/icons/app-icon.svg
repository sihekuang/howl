  <!-- Fur accents -->
  <path d="M256 157 L244 201 L256 190 L268 201 Z" fill="#ffffff"/>
  <path d="M150 260 C125 275, 122 315, 148 340" fill="none" stroke="#4b5563" stroke-width="8" stroke-linecap="round"/>
  <path d="M362 260 C387 275, 390 315, 364 340" fill="none" stroke="#4b5563" stroke-width="8" stroke-linecap="round"/>
