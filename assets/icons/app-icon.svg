<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="80" fill="#f5f7fb"/>

  <!-- Ears -->
  <path d="M145 210 L105 95 L205 165 Z" fill="#4b5563"/>
  <path d="M367 210 L407 95 L307 165 Z" fill="#4b5563"/>
