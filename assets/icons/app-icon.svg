  <!-- Cheeks -->
  <circle cx="195" cy="292" r="42" fill="#f3f4f6"/>
  <circle cx="317" cy="292" r="42" fill="#f3f4f6"/>

  <!-- Eyes -->
  <circle cx="205" cy="240" r="24" fill="#111827"/>
  <circle cx="307" cy="240" r="24" fill="#111827"/>
  <circle cx="213" cy="232" r="8" fill="#ffffff"/>
  <circle cx="315" cy="232" r="8" fill="#ffffff"/>

