<?xml version="1.0" encoding="UTF-8"?>
<!--
  VoiceKeyboard app icon — master.
  Canvas: 1024×1024. Will be rasterized to .icns / .ico / .png by
  assets/icons/build.sh. Designed for full-bleed (no internal margin)
  to match modern macOS icon convention.

  Concept: rainbow-gradient microphone capsule on a dark squircle.
  Calls back to the rainbow waveform inside the recording overlay.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Squircle background: subtle top-down gradient. -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#2a2a30"/>
      <stop offset="100%" stop-color="#0a0a0d"/>
    </linearGradient>

    <!-- Mic capsule fill: vertical rainbow. -->
    <linearGradient id="rainbow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ff3b30"/>
      <stop offset="17%"  stop-color="#ff9500"/>
      <stop offset="33%"  stop-color="#ffd60a"/>
      <stop offset="50%"  stop-color="#34c759"/>
      <stop offset="67%"  stop-color="#0a84ff"/>
      <stop offset="83%"  stop-color="#5e5ce6"/>
      <stop offset="100%" stop-color="#ff2d55"/>
    </linearGradient>

    <!-- Soft top-light highlight on the capsule, sells the 3D feel. -->
    <radialGradient id="capsuleHighlight" cx="0.35" cy="0.18" r="0.55" fx="0.30" fy="0.10">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow for the mic — gives the icon depth on the squircle. -->
    <filter id="micShadow" x="-20%" y="-10%" width="140%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="14" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark squircle background. Corner radius matches Big Sur convention
       (≈ 184/1024 ≈ 18%). macOS will mask further if needed. -->
  <rect x="0" y="0" width="1024" height="1024" rx="184" ry="184" fill="url(#bg)"/>

  <!-- Subtle inner top highlight on the squircle itself (catches light). -->
  <rect x="0" y="0" width="1024" height="1024" rx="184" ry="184"
        fill="url(#capsuleHighlight)" opacity="0.5"/>

  <!-- Microphone group, drop-shadowed against the squircle. -->
  <g filter="url(#micShadow)">
    <!-- Capsule body: rainbow fill with a thin white outline so the
         shape reads cleanly even when scaled down to 16px. -->
    <rect x="372" y="180" width="280" height="500" rx="140" ry="140"
          fill="url(#rainbow)" stroke="#ffffff" stroke-width="14"/>

    <!-- Glossy top-left highlight inside the capsule. -->
    <rect x="372" y="180" width="280" height="500" rx="140" ry="140"
          fill="url(#capsuleHighlight)"/>

    <!-- Yoke (U-shape) under the capsule. Two strokes that meet the
         capsule sides and curve into the stand. -->
    <path d="M 320 540
             V 640
             A 192 192 0 0 0 704 640
             V 540"
          fill="none" stroke="#ffffff" stroke-width="34" stroke-linecap="round"/>

    <!-- Stand. -->
    <line x1="512" y1="700" x2="512" y2="820"
          stroke="#ffffff" stroke-width="34" stroke-linecap="round"/>

    <!-- Base. -->
    <rect x="376" y="800" width="272" height="40" rx="20" ry="20"
          fill="#ffffff"/>
  </g>
</svg>
