  <circle cx="205" cy="240" r="12" fill="#60a5fa" opacity="0.85"/>
  <circle cx="307" cy="240" r="12" fill="#60a5fa" opacity="0.85"/>
  <circle cx="210" cy="235" r="4" fill="#ffffff"/>
  <circle cx="312" cy="235" r="4" fill="#ffffff"/>

  <!-- Muzzle -->
  <ellipse cx="256" cy="305" rx="58" ry="48" fill="#ffffff"/>

  <!-- Nose -->
