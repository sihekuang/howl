<?xml version="1.0" encoding="UTF-8"?>
<!--
  VoiceKeyboard app icon — master.
  Canvas: 1024×1024.

  Ollama-style husky: a single-color silhouette on a dark squircle.
  No facial details, no gradients on the figure — recognition comes
  from posture and outline. Traits we lean on so the silhouette
  reads as a Siberian husky rather than a generic dog:
    - tall pointy ears, slightly tipped outward
    - distinct pointed muzzle
    - thick neck/ruff (huskies have heavy fur around the shoulders)
    - sturdy compact body in a sitting pose
    - the iconic curled tail flicked over the back

  Body posture: sitting, head tilted slightly upward — same
  "looking up at you" vibe as Ollama's mascot.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3a4658"/>
      <stop offset="100%" stop-color="#0e1420"/>
    </linearGradient>

    <radialGradient id="bgGlow" cx="0.30" cy="0.18" r="0.65" fx="0.25" fy="0.10">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <filter id="dropShadow" x="-15%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="20"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark squircle background. -->
  <rect x="0" y="0" width="1024" height="1024" rx="184" ry="184" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="184" ry="184" fill="url(#bgGlow)"/>

  <!-- Single-colour husky silhouette. White on the dark squircle.
       Drawn as ONE continuous contour — head, body, ears all part
       of the same outline so there are no internal seams or stacked
       shapes visible. Walk-through:

         left ear apex ↓ inner left ear ↓ top-of-skull V ↑ right ear
         apex ↓ outer right ear ↓ right cheek ↓ right shoulder ↓
         right haunch / paw ↓ bottom (across paws) ↓ left paw / haunch
         ↑ left shoulder ↑ left cheek ↑ outer left ear ↑ back to
         starting apex.

       The tail is a separate filled path that overlays the body. -->
  <g fill="#f5f5f7" filter="url(#dropShadow)">

    <path d="M 372 96
             L 444 296
             Q 478 286, 512 286
             Q 546 286, 580 296
             L 652 96
             Q 704 220, 716 304
             Q 768 332, 800 400
             Q 856 488, 856 624
             Q 856 800, 824 868
             Q 808 884, 776 884
             L 248 884
             Q 216 884, 200 868
             Q 168 800, 168 624
             Q 168 488, 224 400
             Q 256 332, 308 304
             Q 320 220, 372 96 Z"/>

    <!-- Curled tail, drawn as a comma-shaped patch over the right
         haunch. fill-rule:evenodd lets us cut a hole inside the
         curl so it reads as a tail rather than a flat lobe. -->
    <path fill-rule="evenodd"
          d="M 720 520
             Q 884 488, 920 612
             Q 940 752, 836 808
             Q 744 836, 720 776
             Q 800 776, 836 712
             Q 868 632, 800 596
             Q 744 572, 720 580 Z"/>

  </g>
</svg>
