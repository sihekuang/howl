name: Build .app

# Triggered by:
#   - Tag pushes matching mac-v*  (e.g. mac-v0.1.0)  — for mac releases
#   - Manual dispatch from the Actions tab            — for ad-hoc verification
#
# Platform-scoped tags so each wrapper (mac/windows/linux) releases on
# its own cadence — see "Releases" in the root README. Windows + Linux
# get their own workflows + tag prefixes (win-v*, linux-v*) when those
# wrappers land.
#
# Produces a Developer ID-signed .app uploaded as a workflow artifact.
# Tag pushes (mac-v*) additionally notarize + staple, so the .app
# verifies offline through Gatekeeper. workflow_dispatch builds are
# signed but not notarized — useful for pipeline smoke tests without
# burning Apple notarization round-trips.

on:
  push:
    tags: ['mac-v*']
  workflow_dispatch:

jobs:
  build:
    name: Build, sign, notarize, upload
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache: true
          cache-dependency-path: core/go.sum

      - name: Install Homebrew deps
        # whisper-cpp + ggml: libvkb cgo link.
        # onnxruntime: TSE pipeline at runtime (and bundled into .app).
        # xcodegen: regenerates VoiceKeyboard.xcodeproj from project.yml.
        # python@3.12: pinned by scripts/export_tse_model.py (asteroid req).
        run: brew install whisper-cpp ggml onnxruntime xcodegen python@3.12

      # The Python venv is ~2GB once torch + asteroid + resemblyzer land.
      # Cache it so re-runs don't re-pip-install. Key on the export script
      # so changes to pinned deps invalidate.
      - name: Cache TSE Python venv
        uses: actions/cache@v4
        with:
          path: core/build/.venv-tse
          key: tse-venv-${{ runner.os }}-${{ hashFiles('scripts/export_tse_model.py') }}-v1

      # The built ONNX models (~32MB) only depend on the export script.
      # If the cache hits we skip the (slow) PyTorch tracing run entirely.
      - name: Cache TSE models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: core/build/models
          key: tse-models-${{ runner.os }}-${{ hashFiles('scripts/export_tse_model.py') }}-v1

      - name: Build TSE models (only on cache miss)
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          mkdir -p core/build/models
          # Silero VAD is small enough to download fresh every miss.
          curl -sSL -o core/build/models/silero_vad.onnx \
            https://github.com/snakers4/silero-vad/raw/master/files/silero_vad.onnx
          # tse_model.onnx + speaker_encoder.onnx via PyTorch tracing.
          PY="$(brew --prefix python@3.12)/bin/python3.12"
          VENV=core/build/.venv-tse
          if [ ! -d "$VENV" ]; then "$PY" -m venv "$VENV"; fi
          "$VENV/bin/pip" install --quiet --upgrade pip
          "$VENV/bin/pip" install --quiet \
            torch resemblyzer asteroid requests onnx onnx2torch onnxscript onnxruntime soundfile numpy
          "$VENV/bin/python" scripts/export_tse_model.py --out core/build/models/tse_model.onnx

      # Import the Developer ID Application cert into a temp keychain.
      # The keychain is wiped in the always-run cleanup step at the end
      # of the job, so the cert never persists past this run.
      - name: Set up signing keychain
        env:
          P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KC_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KC="$RUNNER_TEMP/build.keychain-db"
          P12="$RUNNER_TEMP/cert.p12"

          echo "$P12_BASE64" | base64 --decode > "$P12"
          security create-keychain -p "$KC_PASSWORD" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KC_PASSWORD" "$KC"
          security import "$P12" -k "$KC" -P "$P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security

          # Prepend the new keychain to the user's search list so codesign
          # finds the imported identity. xargs strips the surrounding quotes
          # `security list-keychains` prints around each path.
          security list-keychains -d user -s "$KC" \
            $(security list-keychains -d user | tr -d '"' | xargs)

          # Without this, codesign hits an "always allow" GUI dialog that
          # never resolves on a headless runner.
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KC_PASSWORD" "$KC" >/dev/null

          rm -f "$P12"

      - name: Generate Xcode project
        working-directory: mac
        run: xcodegen generate

      - name: Build .app (Developer ID)
        working-directory: mac
        env:
          SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          # Picked up by project.yml's post-build re-sign step so bundled
          # dylibs get a TSA timestamp (required by notarytool).
          CI_TIMESTAMP_SIGN: "1"
        run: |
          set -o pipefail
          xcodebuild \
            -project VoiceKeyboard.xcodeproj \
            -scheme VoiceKeyboard \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build/derived \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options runtime" \
            build

      - name: Locate, verify, and zip .app
        id: pack
        working-directory: mac
        run: |
          set -euo pipefail
          APP="build/derived/Build/Products/Release/VoiceKeyboard.app"
          test -d "$APP"
          # Smoke check: every @rpath dep must resolve to a real file or
          # symlink in Frameworks. Catches a class of bundling regressions
          # without launching the app (which would need the runner desktop).
          missing=0
          for d in "$APP/Contents/Frameworks/"*.dylib; do
            [ -L "$d" ] && continue
            for ref in $(otool -L "$d" 2>/dev/null | tail -n +2 | awk '{print $1}' | grep '^@rpath/' || true); do
              name="${ref#@rpath/}"
              if [ ! -e "$APP/Contents/Frameworks/$name" ]; then
                echo "MISSING dep: $(basename "$d") -> @rpath/$name"
                missing=$((missing+1))
              fi
            done
          done
          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing missing @rpath references in bundled dylibs"
            exit 1
          fi
          # Also verify codesign accepts the bundle.
          codesign --verify --deep --strict "$APP"
          # Ditto produces a zip Finder will unpack cleanly (preserves
          # symlinks, xattrs, ACLs — plain `zip -r` corrupts the bundle).
          ditto -c -k --keepParent "$APP" VoiceKeyboard.app.zip
          ls -lh VoiceKeyboard.app.zip
          echo "zip=mac/VoiceKeyboard.app.zip" >> "$GITHUB_OUTPUT"
          echo "app=mac/$APP" >> "$GITHUB_OUTPUT"
          # Artifact names can't contain '/', so flatten branch refs like
          # 'feat/x' to 'feat-x'. Tag refs (e.g. 'mac-v0.1.0') pass through.
          echo "ref_slug=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"

      # Notarize + staple. Gated on tag pushes so workflow_dispatch runs
      # (used for verifying the workflow itself) don't queue submissions
      # against Apple. notarytool blocks until Apple finishes (typically
      # 1-5 min); --timeout caps the wait so a stuck submission can't
      # hold the runner.
      - name: Notarize and staple
        if: startsWith(github.ref, 'refs/tags/mac-v')
        working-directory: mac
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          P8="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$P8"

          # Submit the zip we already built. Apple stores the notarization
          # ticket server-side; stapler pulls it down in the next step.
          xcrun notarytool submit VoiceKeyboard.app.zip \
            --key "$P8" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait \
            --timeout 30m

          rm -f "$P8"

          # Staple the ticket onto the .app (not the zip — stapling a zip
          # is not a thing). After this the .app verifies offline.
          APP="build/derived/Build/Products/Release/VoiceKeyboard.app"
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"

          # Gatekeeper assessment — should print "accepted" with
          # "source=Notarized Developer ID". Failure here means signing
          # passed but Gatekeeper still won't open the .app on a clean Mac.
          spctl -a -vvv -t install "$APP"

          # Re-zip the now-stapled .app so the artifact + Release upload
          # picks up the version with the embedded ticket.
          rm -f VoiceKeyboard.app.zip
          ditto -c -k --keepParent "$APP" VoiceKeyboard.app.zip
          ls -lh VoiceKeyboard.app.zip

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceKeyboard-${{ steps.pack.outputs.ref_slug }}-app
          path: ${{ steps.pack.outputs.zip }}
          retention-days: 30

      # On a tag push, also attach the zip to the GitHub Release. Created
      # automatically if it doesn't already exist.
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/mac-v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pack.outputs.zip }}
          fail_on_unmatched_files: true
          generate_release_notes: true

      # always() so a failed build doesn't leave the cert + key sitting
      # in a keychain. The runner is ephemeral but defence in depth.
      - name: Cleanup signing keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" 2>/dev/null || true
