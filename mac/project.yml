name: VoiceKeyboard
options:
  bundleIdPrefix: com.voicekeyboard
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: NO
packages:
  VoiceKeyboardCore:
    path: Packages/VoiceKeyboardCore
targets:
  VoiceKeyboard:
    type: application
    platform: macOS
    sources:
      - path: VoiceKeyboard
        excludes:
          - "Info.plist"
          - "VoiceKeyboard.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voicekeyboard.app
        PRODUCT_NAME: VoiceKeyboard
        INFOPLIST_FILE: VoiceKeyboard/Info.plist
        CODE_SIGN_ENTITLEMENTS: VoiceKeyboard/VoiceKeyboard.entitlements
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        LIBRARY_SEARCH_PATHS: "$(SRCROOT)/../core/build"
        OTHER_LDFLAGS: "-lvkb"
    dependencies:
      - package: VoiceKeyboardCore
    preBuildScripts:
      - name: Build Go core
        script: |
          set -e
          # Xcode's GUI build doesn't inherit the user shell PATH, so make/go
          # in /opt/homebrew/bin aren't found by default. Source the user's
          # zprofile / bash_profile if present, then ensure /opt/homebrew/bin
          # and /usr/local/bin are on PATH for the rest of this script.
          [ -f "$HOME/.zprofile" ] && . "$HOME/.zprofile" >/dev/null 2>&1 || true
          [ -f "$HOME/.bash_profile" ] && . "$HOME/.bash_profile" >/dev/null 2>&1 || true
          export PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:$PATH"

          # Sanity check toolchain — gives a clear error if anything's missing.
          command -v make >/dev/null || { echo "error: make not found on PATH" >&2; exit 1; }
          command -v go   >/dev/null || { echo "error: go not found (brew install go)" >&2; exit 1; }

          cd "$SRCROOT/../core"
          unset GOFLAGS
          make build-dylib
        outputFiles:
          - "$(SRCROOT)/../core/build/libvkb.dylib"
          - "$(SRCROOT)/../core/build/libvkb.h"
    postCompileScripts:
      - name: Copy libvkb.dylib into Frameworks
        script: |
          set -e
          mkdir -p "$BUILT_PRODUCTS_DIR/$FRAMEWORKS_FOLDER_PATH"
          cp -f "$SRCROOT/../core/build/libvkb.dylib" \
                "$BUILT_PRODUCTS_DIR/$FRAMEWORKS_FOLDER_PATH/"
          install_name_tool -id "@rpath/libvkb.dylib" \
                "$BUILT_PRODUCTS_DIR/$FRAMEWORKS_FOLDER_PATH/libvkb.dylib"
        inputFiles:
          - "$(SRCROOT)/../core/build/libvkb.dylib"
        outputFiles:
          - "$(BUILT_PRODUCTS_DIR)/$(FRAMEWORKS_FOLDER_PATH)/libvkb.dylib"
schemes:
  VoiceKeyboard:
    build:
      targets:
        VoiceKeyboard: all
    run:
      config: Debug
