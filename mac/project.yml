name: VoiceKeyboard
options:
  bundleIdPrefix: com.voicekeyboard
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
configFiles:
  Debug: Local.xcconfig
  Release: Local.xcconfig
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_HARDENED_RUNTIME: NO
packages:
  VoiceKeyboardCore:
    path: Packages/VoiceKeyboardCore
targets:
  VoiceKeyboard:
    type: application
    platform: macOS
    sources:
      - path: VoiceKeyboard
        excludes:
          - "Info.plist"
          - "VoiceKeyboard.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voicekeyboard.app
        PRODUCT_NAME: VoiceKeyboard
        INFOPLIST_FILE: VoiceKeyboard/Info.plist
        CODE_SIGN_ENTITLEMENTS: VoiceKeyboard/VoiceKeyboard.entitlements
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        LIBRARY_SEARCH_PATHS: "$(SRCROOT)/../core/build"
        OTHER_LDFLAGS: "-lvkb"
    dependencies:
      - package: VoiceKeyboardCore
    preBuildScripts:
      - name: Build Go core
        script: |
          set -e
          # Xcode's GUI build doesn't inherit the user shell PATH, so make/go
          # in /opt/homebrew/bin aren't found by default. Source the user's
          # zprofile / bash_profile if present, then ensure /opt/homebrew/bin
          # and /usr/local/bin are on PATH for the rest of this script.
          [ -f "$HOME/.zprofile" ] && . "$HOME/.zprofile" >/dev/null 2>&1 || true
          [ -f "$HOME/.bash_profile" ] && . "$HOME/.bash_profile" >/dev/null 2>&1 || true
          export PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:$PATH"

          # Sanity check toolchain — gives a clear error if anything's missing.
          command -v make >/dev/null || { echo "error: make not found on PATH" >&2; exit 1; }
          command -v go   >/dev/null || { echo "error: go not found (brew install go)" >&2; exit 1; }

          cd "$SRCROOT/../core"
          unset GOFLAGS
          make build-dylib
        outputFiles:
          - "$(SRCROOT)/../core/build/libvkb.dylib"
          - "$(SRCROOT)/../core/build/libvkb.h"
    postCompileScripts:
      - name: Copy libvkb.dylib + libdf.dylib into Frameworks
        script: |
          set -e
          DST="$BUILT_PRODUCTS_DIR/$FRAMEWORKS_FOLDER_PATH"
          mkdir -p "$DST"
          cp -f "$SRCROOT/../core/build/libvkb.dylib" "$DST/"
          install_name_tool -id "@rpath/libvkb.dylib" "$DST/libvkb.dylib"
          # libdf.dylib is the vendored DeepFilterNet binary that libvkb
          # link-time references at @rpath/libdf.dylib (see core/Makefile
          # build-dylib target). It's not pulled by the Go build, so we
          # ship it from third_party.
          cp -f "$SRCROOT/../core/third_party/deepfilter/lib/macos-arm64/libdf.dylib" "$DST/"
          chmod u+w "$DST/libdf.dylib"
          install_name_tool -id "@rpath/libdf.dylib" "$DST/libdf.dylib"
        inputFiles:
          - "$(SRCROOT)/../core/build/libvkb.dylib"
          - "$(SRCROOT)/../core/third_party/deepfilter/lib/macos-arm64/libdf.dylib"
        outputFiles:
          - "$(BUILT_PRODUCTS_DIR)/$(FRAMEWORKS_FOLDER_PATH)/libvkb.dylib"
          - "$(BUILT_PRODUCTS_DIR)/$(FRAMEWORKS_FOLDER_PATH)/libdf.dylib"
      - name: Copy TSE models into Resources
        script: |
          set -e
          SRC="$SRCROOT/../core/build/models"
          DST="$BUILT_PRODUCTS_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH"
          for f in tse_model.onnx speaker_encoder.onnx; do
            if [ ! -f "$SRC/$f" ]; then
              echo "error: $SRC/$f missing — run ./enroll.sh once from the repo root to build the TSE models" >&2
              exit 1
            fi
          done
          mkdir -p "$DST"
          cp -f "$SRC/tse_model.onnx"       "$DST/"
          cp -f "$SRC/speaker_encoder.onnx" "$DST/"
        inputFiles:
          - "$(SRCROOT)/../core/build/models/tse_model.onnx"
          - "$(SRCROOT)/../core/build/models/speaker_encoder.onnx"
        outputFiles:
          - "$(BUILT_PRODUCTS_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/tse_model.onnx"
          - "$(BUILT_PRODUCTS_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/speaker_encoder.onnx"
      - name: Bundle Homebrew dylibs (ONNX + Whisper)
        shell: /bin/bash
        script: |
          set -e
          # Locate Homebrew prefix. Apple Silicon vs Intel.
          BREW_PREFIX=""
          for prefix in /opt/homebrew /usr/local; do
            if [ -e "$prefix/lib/libonnxruntime.dylib" ]; then
              BREW_PREFIX="$prefix"
              break
            fi
          done
          if [ -z "$BREW_PREFIX" ]; then
            echo "error: libonnxruntime.dylib not found — install via 'brew install onnxruntime'" >&2
            exit 1
          fi

          DST="$BUILT_PRODUCTS_DIR/$FRAMEWORKS_FOLDER_PATH"
          mkdir -p "$DST"

          # Walk the transitive Homebrew dep closure starting from:
          # 1. The just-bundled libvkb.dylib (covers whisper.cpp + ggml,
          #    which libvkb link-time-depends on via cgo).
          # 2. libonnxruntime.dylib (loaded at runtime via dlopen, not in
          #    libvkb's dep table — must be seeded explicitly).
          SEEN="$(mktemp)"
          trap 'rm -f "$SEEN"' EXIT

          walk() {
            local real
            real="$(readlink -f "$1" 2>/dev/null || echo "$1")"
            if grep -qFx "$real" "$SEEN" 2>/dev/null; then return; fi
            echo "$real" >> "$SEEN"
            local deps
            deps="$(otool -L "$real" 2>/dev/null | tail -n +2 | awk '{print $1}' | grep "^$BREW_PREFIX/" || true)"
            while IFS= read -r dep; do
              [ -n "$dep" ] && walk "$dep"
            done <<< "$deps"
          }
          walk "$BREW_PREFIX/lib/libonnxruntime.dylib"
          # Walk libvkb's deps. Note: libvkb itself isn't in $SEEN
          # because it's not under $BREW_PREFIX — but its Homebrew deps
          # are now reached.
          for dep in $(otool -L "$DST/libvkb.dylib" 2>/dev/null | tail -n +2 | awk '{print $1}' | grep "^$BREW_PREFIX/" || true); do
            walk "$dep"
          done

          echo "Bundling $(wc -l < "$SEEN") Homebrew dylibs from $BREW_PREFIX into $DST"

          # First pass: copy each, using basename; set install_name to
          # @rpath/<basename> so dependents find them via the app's rpath.
          while IFS= read -r src; do
            base="$(basename "$src")"
            cp -f "$src" "$DST/$base"
            chmod u+w "$DST/$base"
            install_name_tool -id "@rpath/$base" "$DST/$base"
          done < "$SEEN"

          # Second pass: rewrite each bundled dylib's deps to @rpath.
          # We resolve each dep through readlink to handle the opt/
          # symlink layer (e.g. /opt/homebrew/opt/onnx/lib/libonnx.dylib
          # points at the versioned file in Cellar; we want both
          # rewritten to the same @rpath/<basename>).
          rewrite_deps() {
            local target="$1"
            for dep in $(otool -L "$target" 2>/dev/null | tail -n +2 | awk '{print $1}' | grep "^$BREW_PREFIX/" || true); do
              local dep_real dep_base
              dep_real="$(readlink -f "$dep" 2>/dev/null || echo "$dep")"
              dep_base="$(basename "$dep_real")"
              install_name_tool -change "$dep" "@rpath/$dep_base" "$target"
            done
          }
          while IFS= read -r src; do
            rewrite_deps "$DST/$(basename "$src")"
          done < "$SEEN"

          # Also rewrite libvkb.dylib's own /opt/homebrew refs.
          chmod u+w "$DST/libvkb.dylib"
          rewrite_deps "$DST/libvkb.dylib"
        inputFiles:
          - "/opt/homebrew/lib/libonnxruntime.dylib"
schemes:
  VoiceKeyboard:
    build:
      targets:
        VoiceKeyboard: all
    run:
      config: Debug
