			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/bash;
			shellScript = "set -e\n# Debug builds skip the dylib bundle entirely: libvkb.dylib's\n# cgo link table holds absolute /opt/homebrew paths to whisper /\n# ggml that dyld will resolve at runtime, and ModelPaths.onnxLib\n# falls back to /opt/homebrew/lib/libonnxruntime.dylib when the\n# bundled copy isn't present. The dev runs against Homebrew in\n# place — much faster cold builds and the .app stays tiny.\n# Release does the full bundle so the artifact is self-contained.\nif [ \"$CONFIGURATION\" != \"Release\" ]; then\n  echo \"Skipping Homebrew dylib bundle (Debug — using /opt/homebrew at runtime).\"\n  exit 0\nfi\n# Locate Homebrew prefix. Apple Silicon vs Intel.\nBREW_PREFIX=\"\"\nfor prefix in /opt/homebrew /usr/local; do\n  if [ -e \"$prefix/lib/libonnxruntime.dylib\" ]; then\n    BREW_PREFIX=\"$prefix\"\n    break\n  fi\ndone\nif [ -z \"$BREW_PREFIX\" ]; then\n  echo \"error: libonnxruntime.dylib not found — install via 'brew install onnxruntime'\" >&2\n  exit 1\nfi\n\nDST=\"$BUILT_PRODUCTS_DIR/$FRAMEWORKS_FOLDER_PATH\"\nmkdir -p \"$DST\"\n\n# Skip the whole phase when the bundle is already up to date.\n# Without this guard, the phase adds ~30-60s to every warm\n# build because Xcode can't dependency-track all ~88 output\n# dylibs. Compare against the SOURCE libvkb (in core/build),\n# not the copy in Frameworks — Go rebuilds libvkb only when\n# its sources change, and that's the actual \"did anything\n# change?\" signal we want.\n#\n# IMPORTANT: keep the sentinel OUTSIDE the .app bundle. Any\n# file inside Frameworks/ is treated as a code subcomponent\n# by Xcode's codesign step and must itself be signed; an\n# unsigned sentinel there breaks the .app's seal with\n# \"code object is not signed at all\" failures.\nSENTINEL=\"$BUILT_PRODUCTS_DIR/.${TARGET_NAME}-bundled-deps-stamp\"\nLIBVKB_SRC=\"$SRCROOT/../core/build/libvkb.dylib\"\nif [ -e \"$SENTINEL\" ] \\\n    && [ \"$SENTINEL\" -nt \"$BREW_PREFIX/lib/libonnxruntime.dylib\" ] \\\n    && [ \"$SENTINEL\" -nt \"$LIBVKB_SRC\" ]; then\n  echo \"Homebrew dylib bundle up to date — skipping.\"\n  exit 0\nfi\n\n# Walk the transitive Homebrew dep closure starting from:\n# 1. The just-bundled libvkb.dylib (covers whisper.cpp + ggml,\n#    which libvkb link-time-depends on via cgo).\n# 2. libonnxruntime.dylib (loaded at runtime via dlopen, not in\n#    libvkb's dep table — must be seeded explicitly).\nSEEN=\"$(mktemp)\"\ntrap 'rm -f \"$SEEN\"' EXIT\n\nwalk() {\n  local real\n  real=\"$(readlink -f \"$1\" 2>/dev/null || echo \"$1\")\"\n  if grep -qFx \"$real\" \"$SEEN\" 2>/dev/null; then return; fi\n  echo \"$real\" >> \"$SEEN\"\n  local deps\n  deps=\"$(otool -L \"$real\" 2>/dev/null | tail -n +2 | awk '{print $1}' | grep \"^$BREW_PREFIX/\" || true)\"\n  while IFS= read -r dep; do\n    [ -n \"$dep\" ] && walk \"$dep\"\n  done <<< \"$deps\"\n}\nwalk \"$BREW_PREFIX/lib/libonnxruntime.dylib\"\n# Walk libvkb's deps. Note: libvkb itself isn't in $SEEN\n# because it's not under $BREW_PREFIX — but its Homebrew deps\n# are now reached.\nfor dep in $(otool -L \"$DST/libvkb.dylib\" 2>/dev/null | tail -n +2 | awk '{print $1}' | grep \"^$BREW_PREFIX/\" || true); do\n  walk \"$dep\"\ndone\n\necho \"Bundling $(wc -l < \"$SEEN\") Homebrew dylibs from $BREW_PREFIX into $DST\"\n\n# First pass: copy each, using basename; set install_name to\n# @rpath/<basename> so dependents find them via the app's rpath.\nwhile IFS= read -r src; do\n  base=\"$(basename \"$src\")\"\n  cp -f \"$src\" \"$DST/$base\"\n  chmod u+w \"$DST/$base\"\n  install_name_tool -id \"@rpath/$base\" \"$DST/$base\"\ndone < \"$SEEN\"\n\n# Second pass: rewrite each bundled dylib's deps to @rpath.\n# We resolve each dep through readlink to handle the opt/\n# symlink layer (e.g. /opt/homebrew/opt/onnx/lib/libonnx.dylib\n# points at the versioned file in Cellar; we want both\n# rewritten to the same @rpath/<basename>).\nrewrite_deps() {\n  local target=\"$1\"\n  for dep in $(otool -L \"$target\" 2>/dev/null | tail -n +2 | awk '{print $1}' | grep \"^$BREW_PREFIX/\" || true); do\n    local dep_real dep_base\n    dep_real=\"$(readlink -f \"$dep\" 2>/dev/null || echo \"$dep\")\"\n    dep_base=\"$(basename \"$dep_real\")\"\n    install_name_tool -change \"$dep\" \"@rpath/$dep_base\" \"$target\"\n  done\n}\nwhile IFS= read -r src; do\n  rewrite_deps \"$DST/$(basename \"$src\")\"\ndone < \"$SEEN\"\n\n# Also rewrite libvkb.dylib's own /opt/homebrew refs.\nchmod u+w \"$DST/libvkb.dylib\"\nrewrite_deps \"$DST/libvkb.dylib\"\n\n# Third pass: replicate Homebrew's short-name → long-name symlinks\n# alongside each bundled dylib. Some packages (e.g. ggml) embed\n# @rpath/<short>.dylib refs at build time; my rewrite step only\n# matches /opt/homebrew/... refs and so leaves those untouched.\n# Without the short-name symlink, dyld fails with \"Library not\n# loaded: @rpath/libggml-base.0.dylib\" at runtime.\nwhile IFS= read -r src; do\n  src_dir=\"$(dirname \"$src\")\"\n  src_base=\"$(basename \"$src\")\"\n  for link in \"$src_dir\"/*.dylib; do\n    [ -L \"$link\" ] || continue\n    target_base=\"$(basename \"$(readlink \"$link\")\")\"\n    link_base=\"$(basename \"$link\")\"\n    if [ \"$target_base\" = \"$src_base\" ] && [ \"$link_base\" != \"$src_base\" ]; then\n      (cd \"$DST\" && ln -sf \"$src_base\" \"$link_base\")\n    fi\n  done\ndone < \"$SEEN\"\n\n# Fourth pass: re-codesign every dylib we modified.\n# install_name_tool invalidates the original ad-hoc signatures,\n# and Xcode's automatic codesign at the end of the build does\n# NOT re-sign Frameworks/*.dylib (only the .app bundle and main\n# executable). Without re-signing, macOS SIGKILLs the process\n# at launch with \"code or signature have been modified\".\n# Use $EXPANDED_CODE_SIGN_IDENTITY when available, else ad-hoc.\nIDENTITY=\"${EXPANDED_CODE_SIGN_IDENTITY:--}\"\nSIGN_FLAGS=(--force --sign \"$IDENTITY\")\n# Hardened runtime is required for notarization. Add it whenever\n# signing with a real identity; ad-hoc local builds skip it\n# (matches the historic local-dev fast path).\nif [ \"$IDENTITY\" != \"-\" ]; then\n  SIGN_FLAGS+=(--options runtime)\nfi\n# Timestamping requires a network round-trip to timestamp.apple.com\n# (~5s per dylib). Only enable in CI when we're producing a\n# notarizable build — keeps local Apple Development builds snappy.\nif [ -n \"${CI_TIMESTAMP_SIGN:-}\" ]; then\n  SIGN_FLAGS+=(--timestamp)\nfi\nwhile IFS= read -r src; do\n  codesign \"${SIGN_FLAGS[@]}\" \"$DST/$(basename \"$src\")\"\ndone < \"$SEEN\"\ncodesign \"${SIGN_FLAGS[@]}\" \"$DST/libvkb.dylib\"\ncodesign \"${SIGN_FLAGS[@]}\" \"$DST/libdf.dylib\"\n\n# Mark the bundle as up-to-date so the next warm build can skip.\ntouch \"$SENTINEL\"\n";
